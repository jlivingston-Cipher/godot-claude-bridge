name: integration

# Real host <-> Godot integration tests. Installs a Godot binary on the runner
# and exercises the host against a LIVE engine — the one thing the unit suite
# (which mocks the sockets) deliberately cannot do, and that no competitor's CI
# is known to do either.
#
#   * cli-plane     — headless, deterministic, expected to pass. This is the gate.
#   * runtime-plane — boots the example GAME headless (no editor, no GUI) and drives Plane C
#                     against its in-game ClaudeRuntimeBridge autoload (:9081). Asserts D6
#                     zero-config console capture: a live print() reaches runtime_get_log via
#                     the scriptable Logger. MATRIX across 4.3 (below the 4.5 floor — capture is a
#                     documented no-op: bridge loads, print() absent, push_log still served), 4.5
#                     (the floor where OS.add_logger was introduced) and 4.7 (newest stable) — on
#                     4.5/4.7 the print() must be captured. Headless & deterministic like cli-plane
#                     (no Xvfb/GPU), and — like cli-plane — a REQUIRED gate: all three arms must pass.
#   * editor-plane — boots the editor GUI under Xvfb and hits the built-in LSP. Runs as a
#                    MATRIX across the 4.3 baseline and the newest stable (4.7): the D7_CAPS /
#                    D7_WS_RAW markers answer whether workspace/symbol and the other
#                    advertised-but-dead-on-4.3 LSP providers return results on a modern build.
#                    Also runs the D3 resource-subscription probe (D3_SUB_* markers): a live
#                    selection change over the addon bridge must push notifications/resources/updated.
#                    EXPERIMENTAL: runs under continue-on-error while the GUI-boot
#                    timing is tuned on real runners, so it never blocks a merge.
#   * dap-plane    — boots the same editor GUI under Xvfb and connects to its built-in
#                    Debug Adapter (DAP, :6006): runs the initialize handshake, dumps
#                    the adapter's advertised capabilities (D_DAP_CAPS / D_DAP_FILTERS —
#                    the "D-DAP" probe), and best-effort launches the example scene to a
#                    breakpoint. Runs as a MATRIX across the 4.3 baseline and the newest
#                    stable (4.7) so the D_DAP_* markers reveal which advertised-but-dead-
#                    on-4.3 capabilities light up on a modern build. Also EXPERIMENTAL /
#                    continue-on-error (never blocks).
#   * csharp-plane  — D4 C1 + C2 + C3. Downloads a Mono/.NET Godot build + the .NET SDK and boots the
#                     C# fixture (example-csharp/) headless: dotnet-builds the project, imports +
#                     --build-solutions, then asserts the C# scene's _Ready() ran (C#_PLANE_BOOT_OK).
#                     C2: also installs OmniSharp and runs a live cs_* LSP probe against it over the
#                     fixture (markers C#_LSP_*: reached, capabilities, per-tool probes). C3: installs
#                     netcoredbg and runs a live cs_dbg_* DAP probe (markers C#_DAP_*: initialize gate
#                     reached + capabilities, then a best-effort launch-to-breakpoint flow — log-only,
#                     as the netcoredbg + Godot native-host attach story is being established).
#                     Now a REQUIRED gate (session 25): the fixture build, live OmniSharp cs_* LSP
#                     probe and the netcoredbg initialize gate must pass — the launch-to-breakpoint
#                     flow past C#_DAP_REACHED stays log-only. Promoted from experimental the way
#                     runtime-plane was in session 20. See docs/D4_CSHARP_PLAN.md.
#   * authoring-plane — boots the editor GUI under Xvfb (like editor-plane) and drives the Group E
#                     (physics/collision) + Group F (VFX/audio) authoring mutators against the addon
#                     bridge (:9080), asserting each mutation by reading the live edited scene back
#                     through separate read tools — node_get_children / node_get_property /
#                     project_get_setting / resource_load (markers AUTH_PHYS_* / AUTH_VFX_* /
#                     AUTH_AUDIO_*). Single newest-stable arm — E+F are version-stable engine
#                     features, unlike the LSP/DAP planes that matrix 4.3/4.7 for capability
#                     divergence. EXPERIMENTAL / continue-on-error while GUI-boot timing is tuned;
#                     promote to a required gate once green across a few runs (the
#                     runtime-plane/csharp-plane pattern). Undo-stack assertion is deferred (no
#                     bridge action triggers an editor undo yet).
#
# Kept separate from ci.yml so a flaky live-engine step can never gate the fast,
# deterministic build/test/contract checks.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

env:
  # Standard (non-mono) Godot build — enough for the GDScript planes. Bump as needed.
  GODOT_VERSION: "4.3-stable"

jobs:
  cli-plane:
    name: CLI plane vs real Godot (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: host/package-lock.json
      - name: Install Godot (standard linux build)
        run: |
          set -eux
          curl -fL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot.zip
          GODOT_BIN="$PWD/Godot_v${GODOT_VERSION}_linux.x86_64"
          chmod +x "$GODOT_BIN"
          "$GODOT_BIN" --version
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"
      - name: Build host
        working-directory: host
        run: npm ci && npm run build
      - name: CLI-plane integration smoke
        working-directory: host
        env:
          GODOT_PROJECT: ${{ github.workspace }}/example
        run: node test-integration/cli.integration.mjs

  runtime-plane:
    name: runtime plane vs real game (headless)
    runs-on: ubuntu-latest
    # A required gate, like cli-plane: headless & deterministic (no Xvfb/GPU), so a live-engine flake
    # can't hide a real regression. All three matrix arms must pass; added to branch protection.
    strategy:
      fail-fast: false        # the 4.3 (no-op), 4.5 (capture floor) and 4.7 (newest) arms are independent
      matrix:
        godot: [ "4.3-stable", "4.5-stable", "4.7-stable" ]
    env:
      # Exercise both sides of the D6 capture boundary. 4.5 (the floor where the scriptable Logger /
      # OS.add_logger was introduced) and 4.7 (newest stable): a live print() must be captured into
      # runtime_get_log. 4.3 (below the floor): capture is a documented no-op — the probe asserts the
      # bridge still loads, capture is false, the print() is absent, and push_log entries are still
      # served. Overrides GODOT_VERSION for this job only.
      GODOT_VERSION: ${{ matrix.godot }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: host/package-lock.json
      - name: Install Godot (standard linux build)
        run: |
          set -eux
          curl -fL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot.zip
          GODOT_BIN="$PWD/Godot_v${GODOT_VERSION}_linux.x86_64"
          chmod +x "$GODOT_BIN"
          "$GODOT_BIN" --version
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"
      - name: Build host
        working-directory: host
        run: npm ci && npm run build
      - name: Import the example project (headless)
        run: '"$GODOT_BIN" --headless --path "${{ github.workspace }}/example" --import || true'
      - name: Boot the game headless and run the D6 capture probe
        working-directory: host
        env:
          GODOT_PROJECT: ${{ github.workspace }}/example
        run: |
          set -eux
          # Plane C runs INSIDE the running game (no editor, no GUI): the runtime autoload opens
          # :9081. Fully headless — no Xvfb / GPU, unlike the editor/dap planes. Boot the game in
          # the background, wait for the port, then run the probe (its exit status gates the step).
          "$GODOT_BIN" --headless --path "$GODOT_PROJECT" >/tmp/godot-game.log 2>&1 &
          for i in $(seq 1 40); do
            if node -e "require('net').connect(9081,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))" 2>/dev/null; then
              echo "runtime bridge port open"; break
            fi
            sleep 1
          done
          node test-integration/runtime-capture.integration.mjs
      - name: Game log tail (on failure)
        if: always()
        run: tail -n 50 /tmp/godot-game.log || true

  editor-plane:
    name: editor / LSP plane vs real editor (experimental)
    runs-on: ubuntu-latest
    continue-on-error: true   # GUI-boot timing still being tuned; must never block a merge
    strategy:
      fail-fast: false        # one Godot version's probe must not cancel the other
      matrix:
        godot: [ "4.3-stable", "4.7-stable" ]
    env:
      # Probe BOTH the 4.3 baseline and the newest stable (4.7): the D7_CAPS / D7_WS_RAW
      # markers then answer whether workspace/symbol and the other advertised-but-dead-on-4.3
      # LSP providers actually return results on a modern build. Overrides the workflow-level
      # GODOT_VERSION for this job only; the run steps use it verbatim.
      GODOT_VERSION: ${{ matrix.godot }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: host/package-lock.json
      - name: Install Godot + Xvfb
        run: |
          set -eux
          sudo apt-get update && sudo apt-get install -y xvfb libgl1-mesa-dri libglu1-mesa
          curl -fL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot.zip
          GODOT_BIN="$PWD/Godot_v${GODOT_VERSION}_linux.x86_64"
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"
      - name: Build host
        working-directory: host
        run: npm ci && npm run build
      - name: Import the example project (headless)
        run: '"$GODOT_BIN" --headless --path "${{ github.workspace }}/example" --import || true'
      - name: Boot the editor under Xvfb and run the LSP smoke
        working-directory: host
        env:
          GODOT_PROJECT: ${{ github.workspace }}/example
          # A CI runner has no GPU, so Godot's default Vulkan backend segfaults on
          # init before the LSP can start. Force software OpenGL (Mesa llvmpipe).
          LIBGL_ALWAYS_SOFTWARE: '1'
        run: |
          set -eux
          xvfb-run -a -s "-screen 0 1280x720x24" \
            "$GODOT_BIN" --editor --path "$GODOT_PROJECT" \
            --rendering-driver opengl3 --audio-driver Dummy \
            >/tmp/godot-editor.log 2>&1 &
          GODOT_PID=$!
          # Software-rendered editor boot is slow — wait up to ~120s for the LSP port.
          for i in $(seq 1 60); do
            if node -e "require('net').connect(6005,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))" 2>/dev/null; then
              echo "LSP port open"; break
            fi
            sleep 2
          done
          node test-integration/editor-lsp.integration.mjs
          # D3: the Claude Bridge addon (:9080) comes up as the editor enables the
          # plugin. Wait for it, then probe the live resource-subscription push path
          # (subscribe -> live selection change -> resources/updated; D3_SUB_* markers).
          for i in $(seq 1 30); do
            if node -e "require('net').connect(9080,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))" 2>/dev/null; then
              echo "bridge port open"; break
            fi
            sleep 2
          done
          node test-integration/editor-subscriptions.integration.mjs
          kill "$GODOT_PID" 2>/dev/null || true
      - name: Editor log tail (on failure)
        if: always()
        run: tail -n 50 /tmp/godot-editor.log || true

  dap-plane:
    name: DAP / debugger plane vs real adapter (experimental)
    runs-on: ubuntu-latest
    continue-on-error: true   # novel live-adapter probe; must never block a merge
    strategy:
      fail-fast: false        # one Godot version's probe must not cancel the other
      matrix:
        godot: [ "4.3-stable", "4.7-stable" ]
    env:
      # Probe BOTH the 4.3 baseline and the newest stable (4.7): the D_DAP_* markers then
      # show which advertised-but-dead-on-4.3 capabilities (setVariable / evaluate /
      # breakpoint modifiers) actually light up on a modern build. Overrides the
      # workflow-level GODOT_VERSION for this job only; the run steps use it verbatim.
      GODOT_VERSION: ${{ matrix.godot }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: host/package-lock.json
      - name: Install Godot + Xvfb
        run: |
          set -eux
          sudo apt-get update && sudo apt-get install -y xvfb libgl1-mesa-dri libglu1-mesa
          curl -fL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot.zip
          GODOT_BIN="$PWD/Godot_v${GODOT_VERSION}_linux.x86_64"
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"
      - name: Build host
        working-directory: host
        run: npm ci && npm run build
      - name: Import the example project (headless)
        run: '"$GODOT_BIN" --headless --path "${{ github.workspace }}/example" --import || true'
      - name: Boot the editor under Xvfb and run the DAP smoke
        working-directory: host
        env:
          GODOT_PROJECT: ${{ github.workspace }}/example
          # Same as the LSP plane: a CI runner has no GPU, so force software OpenGL
          # (Mesa llvmpipe) or Godot's default Vulkan backend segfaults on init.
          LIBGL_ALWAYS_SOFTWARE: '1'
        run: |
          set -eux
          xvfb-run -a -s "-screen 0 1280x720x24" \
            "$GODOT_BIN" --editor --path "$GODOT_PROJECT" \
            --rendering-driver opengl3 --audio-driver Dummy \
            >/tmp/godot-editor-dap.log 2>&1 &
          GODOT_PID=$!
          # The Debug Adapter is served by the editor (port 6006). Software-rendered
          # editor boot is slow — wait up to ~120s for the DAP port to open.
          for i in $(seq 1 60); do
            if node -e "require('net').connect(6006,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))" 2>/dev/null; then
              echo "DAP port open"; break
            fi
            sleep 2
          done
          node test-integration/editor-dap.integration.mjs
          # Second probe against the same editor: does 4.3 honor condition/hitCondition/
          # logMessage breakpoint modifiers it advertises as unsupported? (log-only)
          sleep 3
          node test-integration/editor-dap-breakpoints.integration.mjs
          kill "$GODOT_PID" 2>/dev/null || true
      - name: Editor log tail (on failure)
        if: always()
        run: tail -n 80 /tmp/godot-editor-dap.log || true

  csharp-plane:
    name: C# / .NET plane vs real Mono build
    runs-on: ubuntu-latest
    # D4 C1 (fixture/boot) + C2 (cs_* semantic tools via OmniSharp) + C3 (cs_dbg_* via netcoredbg).
    # A REQUIRED gate as of session 25: green on real runners across C1+C2+C3 and the C# LSP
    # mutators, so a live-engine regression in the C#/.NET plane now blocks a merge — the way
    # runtime-plane was promoted in session 20. The fixture/host builds, the OmniSharp cs_* LSP
    # probe and the netcoredbg initialize gate (C#_DAP_REACHED) all gate the job; the netcoredbg
    # launch-to-breakpoint flow past that gate stays log-only. See docs/D4_CSHARP_PLAN.md.
    env:
      # The .NET/Mono Godot build (NOT the standard build the other planes download). Its version
      # MUST match the Godot.NET.Sdk pinned in example-csharp/ExampleCsharp.csproj (4.7.0) and the
      # net8.0 target — see docs/D4_CSHARP_PLAN.md §"Version alignment".
      GODOT_VERSION: "4.7-stable"
      # Tool releases are PINNED, not `releases/latest`: csharp-plane is a REQUIRED gate (session 25),
      # so an upstream asset rename — or a bad `latest` — would block every merge. These tags are the
      # known-good releases green on this gate as of the 0.9.0 cut; bump them deliberately after a green
      # run rather than tracking `latest`. The asset names below still resolve via `find`, so a rename
      # at a pinned tag still surfaces as an explicit empty-var failure. See docs/D4_CSHARP_PLAN.md.
      OMNISHARP_VERSION: "v1.39.15"      # OmniSharp/omnisharp-roslyn — published 2025-11-14
      NETCOREDBG_VERSION: "3.2.0-1092"   # Samsung/netcoredbg — published 2026-06-25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          # 8.0.x builds the fixture (net8.0); 6.0.x is the runtime the OmniSharp
          # net6.0 build needs for the C2 cs_* LSP probe below.
          dotnet-version: |
            8.0.x
            6.0.x
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: host/package-lock.json
      - name: Install Mono/.NET Godot (linux x86_64)
        run: |
          set -eux
          # The mono asset differs from the standard planes: the ZIP expands to a DIRECTORY, and the
          # binary inside carries the "_mono_linux.x86_64" suffix. Resolve it with find so a minor
          # naming change surfaces as an empty-var failure rather than a wrong path.
          curl -fL -o godot-mono.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_mono_linux_x86_64.zip"
          unzip -q godot-mono.zip
          GODOT_BIN="$(find "$PWD/Godot_v${GODOT_VERSION}_mono_linux_x86_64" -maxdepth 1 -type f -name 'Godot_v*_mono_linux.x86_64' | head -1)"
          test -n "$GODOT_BIN"
          chmod +x "$GODOT_BIN"
          "$GODOT_BIN" --version
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"
      - name: Build the C# project standalone (OmniSharp-readiness, C2)
        working-directory: example-csharp
        run: |
          set -eux
          # Proves the project resolves Godot.NET.Sdk + GodotSharp and compiles WITHOUT the editor —
          # the same build OmniSharp will drive for the cs_* semantic tools in C2.
          dotnet restore
          dotnet build -c Debug --no-restore
      - name: Build host
        working-directory: host
        run: npm ci && npm run build
      - name: Install OmniSharp (linux x64, net6.0)
        run: |
          set -eux
          # OmniSharp is the C# language server the cs_* tools drive (spawned over stdio by the host).
          # The net6.0 build is a native executable; resolve it with find so a naming change surfaces
          # as an empty-var failure. Version PINNED via $OMNISHARP_VERSION (job env) — a required gate
          # must not ride `releases/latest`, whose asset can be renamed out from under the job.
          curl -fL -o omnisharp.tar.gz "https://github.com/OmniSharp/omnisharp-roslyn/releases/download/${OMNISHARP_VERSION}/omnisharp-linux-x64-net6.0.tar.gz"
          mkdir -p "$PWD/omnisharp" && tar -xzf omnisharp.tar.gz -C "$PWD/omnisharp"
          OMNISHARP_BIN="$(find "$PWD/omnisharp" -maxdepth 2 -type f -name 'OmniSharp' | head -1)"
          test -n "$OMNISHARP_BIN"
          chmod +x "$OMNISHARP_BIN"
          # Do NOT run `OmniSharp --version` as a smoke: some builds start the LSP server and wait on
          # stdin instead of printing a version and exiting, which would hang the step. The probe below
          # (which spawns OmniSharp over stdio and drives an initialize handshake) is the real check.
          echo "resolved OmniSharp: $OMNISHARP_BIN"
          echo "OMNISHARP_BIN=$OMNISHARP_BIN" >> "$GITHUB_ENV"
      - name: Install netcoredbg (linux amd64, C3)
        run: |
          set -eux
          # netcoredbg (Samsung, MIT) is the .NET debug adapter the cs_dbg_* tools drive (spawned over
          # stdio by the host). Resolve the binary with find so a naming change surfaces as an empty-var
          # failure. Version PINNED via $NETCOREDBG_VERSION (job env) — a required gate must not ride
          # `releases/latest`, whose asset can be renamed out from under the job.
          curl -fL -o netcoredbg.tar.gz "https://github.com/Samsung/netcoredbg/releases/download/${NETCOREDBG_VERSION}/netcoredbg-linux-amd64.tar.gz"
          mkdir -p "$PWD/netcoredbg-dist" && tar -xzf netcoredbg.tar.gz -C "$PWD/netcoredbg-dist"
          NETCOREDBG_BIN="$(find "$PWD/netcoredbg-dist" -maxdepth 2 -type f -name 'netcoredbg' | head -1)"
          test -n "$NETCOREDBG_BIN"
          chmod +x "$NETCOREDBG_BIN"
          echo "resolved netcoredbg: $NETCOREDBG_BIN"
          echo "NETCOREDBG_BIN=$NETCOREDBG_BIN" >> "$GITHUB_ENV"
      - name: C2 — live cs_* LSP probe vs real OmniSharp (markers C#_LSP_*)
        working-directory: host
        env:
          GODOT_CSHARP_PROJECT: ${{ github.workspace }}/example-csharp
          GODOT_CSLSP_CMD: ${{ env.OMNISHARP_BIN }}
          GODOT_CSLSP_ARGS: '-lsp'
        run: |
          set -eux
          # OmniSharp drives the design-time build warmed by the standalone step above. The probe
          # reaches the server (the gate) then best-effort exercises the cs_* tools; markers C#_LSP_*.
          # Bounded by an outer timeout so a misbehaving server can never hang the runner.
          timeout 300 node test-integration/csharp-lsp.integration.mjs
      - name: Import + build C# solution (headless)
        run: '"$GODOT_BIN" --headless --path "${{ github.workspace }}/example-csharp" --import --build-solutions --quit-after 200 || true'
      - name: C3 — live cs_dbg_* DAP probe vs real netcoredbg (markers C#_DAP_*)
        working-directory: host
        env:
          GODOT_CSHARP_PROJECT: ${{ github.workspace }}/example-csharp
          GODOT_CSDAP_CMD: ${{ env.NETCOREDBG_BIN }}
          GODOT_CSHARP_BIN: ${{ env.GODOT_BIN }}
        run: |
          set -eux
          # The C# solution was just built, so the game can run under the debugger. The probe reaches
          # netcoredbg (the gate: C#_DAP_REACHED) then best-effort launches the game to a breakpoint;
          # markers C#_DAP_*. Bounded by an outer timeout so a misbehaving adapter can never hang the
          # runner. LOG-ONLY beyond the gate — the netcoredbg + Godot native-host attach story is the
          # least-certain piece of D4 (see docs/D4_CSHARP_PLAN.md), proven by the mock unit suite.
          timeout 180 node test-integration/csharp-dap.integration.mjs
      - name: Boot the C# game headless (C1 smoke — the .NET assembly loads and the scene runs)
        run: |
          set -eux
          # C1 acceptance: the engine boots C#. Player._Ready() prints the marker on the first frame;
          # --quit-after keeps it deterministic and the outer timeout guards against a hang.
          timeout 120 "$GODOT_BIN" --headless --path "${{ github.workspace }}/example-csharp" \
            --quit-after 200 >/tmp/godot-csharp.log 2>&1 || true
          echo "=== C#_PLANE log ==="; cat /tmp/godot-csharp.log || true
          if grep -q "\[example-csharp\] player ready" /tmp/godot-csharp.log; then
            echo "C#_PLANE_BOOT_OK: C# _Ready ran under the Mono build"
          else
            echo "C#_PLANE_BOOT_FAIL: '[example-csharp] player ready' marker not found"
            exit 1
          fi
      - name: C# game log tail (on failure)
        if: always()
        run: tail -n 80 /tmp/godot-csharp.log || true

  authoring-plane:
    name: authoring plane / E+F mutators vs real editor (experimental)
    runs-on: ubuntu-latest
    continue-on-error: true   # GUI-boot timing tuned on real runners; never blocks a merge until promoted
    env:
      # Groups E+F (physics/collision + VFX/audio) are version-stable engine features, so a single
      # newest-stable arm is enough — unlike the LSP/DAP planes, which matrix 4.3/4.7 to reveal
      # capability divergence. Overrides the workflow-level GODOT_VERSION for this job only.
      GODOT_VERSION: "4.7-stable"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: host/package-lock.json
      - name: Install Godot + Xvfb
        run: |
          set -eux
          sudo apt-get update && sudo apt-get install -y xvfb libgl1-mesa-dri libglu1-mesa
          curl -fL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot.zip
          GODOT_BIN="$PWD/Godot_v${GODOT_VERSION}_linux.x86_64"
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"
      - name: Build host
        working-directory: host
        run: npm ci && npm run build
      - name: Import the example project (headless)
        run: '"$GODOT_BIN" --headless --path "${{ github.workspace }}/example" --import || true'
      - name: Boot the editor under Xvfb and run the authoring (E+F) mutator probe
        working-directory: host
        env:
          GODOT_PROJECT: ${{ github.workspace }}/example
          # A CI runner has no GPU, so Godot's default Vulkan backend segfaults on init before the
          # addon bridge can start. Force software OpenGL (Mesa llvmpipe), same as the editor/dap planes.
          LIBGL_ALWAYS_SOFTWARE: '1'
        run: |
          set -eux
          xvfb-run -a -s "-screen 0 1280x720x24" \
            "$GODOT_BIN" --editor --path "$GODOT_PROJECT" \
            --rendering-driver opengl3 --audio-driver Dummy \
            >/tmp/godot-editor-authoring.log 2>&1 &
          GODOT_PID=$!
          # The Claude Bridge addon opens :9080 once the editor enables the plugin. Software-rendered
          # editor boot is slow — wait up to ~120s for the bridge port before driving the mutators.
          for i in $(seq 1 60); do
            if node -e "require('net').connect(9080,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))" 2>/dev/null; then
              echo "bridge port open"; break
            fi
            sleep 2
          done
          node test-integration/authoring-plane.integration.mjs
          kill "$GODOT_PID" 2>/dev/null || true
      - name: Editor log tail (on failure)
        if: always()
        run: tail -n 80 /tmp/godot-editor-authoring.log || true
