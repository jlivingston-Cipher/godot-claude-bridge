name: ci

# Gate 0 of the Go/No-Go checklist, automated.
#
# This runs the ONE check no authoring or cloud environment could: the real
# `npm install` + `npm run build` against the published @modelcontextprotocol/sdk.
# It is what surfaced the ToolResult type defect — had this existed, that
# regression could never have merged silently. Fully headless (no Godot GUI),
# so it runs on stock runners.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  contract-check:
    name: contract check (host↔addon↔catalog parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Static parity check (no Godot / no registry needed)
        run: python3 scripts/contract_check.py

  build:
    name: real SDK build (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [ '18', '20', '22' ]
    defaults:
      run:
        working-directory: host
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: host/package-lock.json
      - name: Install against the real registry (reproducible)
        run: npm ci
      - name: Build — tsc against the real SDK types, 0 errors required
        run: npm run build
      - name: Assert dist/index.js was emitted
        run: test -f dist/index.js
      - name: Onboarding CLI smoke — doctor runs headless (host-only, no Godot)
        # The bin dispatches `doctor` without touching the stdio server path.
        # /bin/echo stands in for the Godot binary (prints a version, exits 0);
        # no project.godot in host/ so the addon checks skip, and the four bridge
        # probes fail fast (nothing listening) as informational — so the report is
        # ok and exit code 0. Proves the built dist actually routes the subcommand.
        run: |
          GODOT_BIN=/bin/echo node dist/index.js doctor --json > /tmp/doctor.json
          cat /tmp/doctor.json
          node -e "const r=JSON.parse(require('node:fs').readFileSync('/tmp/doctor.json','utf8')); const g=r.checks.find(c=>c.name==='godot-binary'); if(!g||g.status!=='ok'){console.error('::error::doctor: godot-binary check not ok');process.exit(1);} if(!r.checks.some(c=>c.name==='editor-bridge')){console.error('::error::doctor: missing bridge checks');process.exit(1);} console.log('ONBOARD_DOCTOR_OK');"
      - name: Onboarding CLI smoke — init installs + enables the addon (host-only)
        # Resolves the addon from the repo-root addons/ in a fresh checkout, copies
        # it into a throwaway project, and enables it in project.godot.
        run: |
          tmp="$(mktemp -d)"
          printf 'config_version=5\n\n[application]\n\nconfig/name="smoke"\n' > "$tmp/project.godot"
          node dist/index.js init --project "$tmp" --client none
          test -f "$tmp/addons/breakpoint_mcp/plugin.cfg" || { echo "::error::init: addon not copied"; exit 1; }
          grep -q 'res://addons/breakpoint_mcp/plugin.cfg' "$tmp/project.godot" || { echo "::error::init: plugin not enabled"; exit 1; }
          echo "ONBOARD_INIT_OK"
      - name: Onboarding packaging — the addon is included in the npm tarball
        # stage-addon copies the canonical addon into host/addon/ (files: addon/**),
        # so the published tarball carries the addon that init installs.
        run: |
          npm run stage-addon
          npm pack --dry-run 2>&1 | grep -q 'addon/breakpoint_mcp/plugin.cfg' || { echo "::error::pack: addon missing from tarball"; exit 1; }
          echo "ONBOARD_PACK_OK"
      - name: Assert the resolved SDK is still 1.x
        # A v2 major changes the registerTool / import surface and needs the
        # migration in README before the package.json range is bumped.
        # Read the installed package.json off disk: the SDK's "exports" map does
        # not expose "./package.json", so require('@…/sdk/package.json').version
        # resolves to undefined on current Node and this check throws spuriously.
        run: |
          node -e "const v=JSON.parse(require('node:fs').readFileSync('node_modules/@modelcontextprotocol/sdk/package.json','utf8')).version; console.log('resolved @modelcontextprotocol/sdk', v); if(!v || !v.startsWith('1.')){console.error('::error::@modelcontextprotocol/sdk resolved to '+v+' (not 1.x). Apply the SDK v2 migration in README before bumping the range.'); process.exit(1);}"

  test:
    name: host tests (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    # Unit + loopback-socket integration tests (node:test, zero extra deps).
    # Fully headless — no Godot editor/LSP/DAP; the socket protocols are
    # exercised against in-process mock servers on 127.0.0.1.
    strategy:
      fail-fast: false
      matrix:
        node: [ '18', '20', '22' ]
    defaults:
      run:
        working-directory: host
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: host/package-lock.json
      - name: Install against the real registry (reproducible)
        run: npm ci
      - name: Compile the suite and run it (node:test)
        run: npm test
