[plugin]

name="Claude Bridge"
description="Exposes the live Godot editor and the running game to an MCP host so Claude can drive them: scene/node/resource CRUD with full undo/redo, project settings, ClassDB, editor + in-game screenshots, and an in-game runtime bridge (live SceneTree, property get/set, method calls, signals, input injection, Performance monitors). Pairs with the godot-claude-bridge MCP host."
author="jlivingston-Cipher"
version="0.6.1"
script="plugin.gd"
